<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.38/build/spline-viewer.js"></script>
  <style>
    :root {
      --primary: #6c63ff;
      --primary-dark: #564fd1;
      --text: #f8f9fa;
      --text-secondary: #adb5bd;
      --bg: #0f0f13;
      --bg-transparent: rgba(15, 15, 19, 0.7);
      --transition: all 0.4s cubic-bezier(0.65, 0, 0.35, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }

    spline-viewer {
      position: fixed;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      z-index: 0;
    }

    .content-container {
      position: relative;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      min-height: 100vh;
    }

    .text-content {
      width: 50%;
      padding: 0 5%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 5%;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
      background: var(--bg-transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      transition: var(--transition);
    }

    .logo:hover {
      color: var(--primary);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      position: relative;
      transition: var(--transition);
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: var(--transition);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .content h3 {
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 1rem;
      color: var(--text-secondary);
      animation: fadeIn 1s ease-out;
    }

    .content h1 {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1rem;
      animation: slideInLeft 0.8s ease-out;
    }

    .content h2 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      animation: slideInRight 0.8s ease-out;
    }

    #typed-name,
    #typed-role {
      color: var(--primary);
      position: relative;
      display: inline-block;
    }

    .content p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: var(--text-secondary);
      animation: fadeIn 1.2s ease-out;
    }

    .socials {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      animation: fadeIn 1.4s ease-out;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 1.2rem;
      transition: var(--transition);
    }

    .socials a:hover {
      background: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
    }

    .cv-btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: var(--primary);
      color: var(--text);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: var(--transition);
      animation: fadeIn 1.6s ease-out;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .cv-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
    }

    .cv-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-100%);
      transition: 0.6s;
      z-index: -1;
    }

    .cv-btn:hover::before {
      transform: translateX(100%);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 1024px) {
      spline-viewer { width: 0%; }
      .text-content { width: 60%; }
    }

    @media (max-width: 768px) {
      .navbar { padding: 1rem 5%; }
      .nav-links { gap: 1rem; }
      .content h1 { font-size: 3rem; }
      .content h2 { font-size: 2rem; }
      spline-viewer { opacity: 0.5; right: -80px; }
    }

    @media (max-width: 576px) {
      spline-viewer { display: none; }
      .text-content { width: 100%; padding: 0 1.5rem; }
      .navbar { flex-direction: column; padding: 2rem; }
      .nav-links { margin-top: 1rem; gap: 0.8rem; }
      .content h1 { font-size: 2.5rem; }
      .content h2 { font-size: 1.5rem; }
      .content p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Spline 3D Background -->
  <spline-viewer url="https://prod.spline.design/chobXja6UJ9mEXRa/scene.splinecode"></spline-viewer>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">Portfolio.</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Skills</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero Content -->
  <div class="content-container">
    <div class="text-content">
      <div class="content">
        <h3>Hello, It's Me</h3>
        <h1><span id="typed-name"></span></h1>
        <h2>And I'm a <span class="highlight" id="typed-role"></span></h2>
        <p>🎓 CS Student @ FAST '27 | Aspiring Full-Stack Developer | AI/ML Explorer 🚀</p>
        <div class="socials">
          <a href="#"><i class="fab fa-github"></i></a>
          <a href="#"><i class="fab fa-dribbble"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>
        <a href="#" class="cv-btn">Download CV</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    const nameText = "Hamda";
    const roles = ["Creative Developer", "UI/UX Enthusiast", "Full-Stack Developer"];
    let roleIndex = 0;
    let charIndex = 0;
    let typingNameDone = false;
    const nameElement = document.getElementById("typed-name");
    const roleElement = document.getElementById("typed-role");

    function type() {
      if (!typingNameDone) {
        if (charIndex < nameText.length) {
          nameElement.textContent += nameText.charAt(charIndex);
          charIndex++;
          setTimeout(type, 150);
        } else {
          typingNameDone = true;
          charIndex = 0;
          setTimeout(type, 500);
        }
      } else {
        if (charIndex < roles[roleIndex].length) {
          roleElement.textContent += roles[roleIndex].charAt(charIndex);
          charIndex++;
          setTimeout(type, 100);
        } else {
          setTimeout(erase, 2000);
        }
      }
    }

    function erase() {
      if (charIndex > 0) {
        roleElement.textContent = roles[roleIndex].substring(0, charIndex - 1);
        charIndex--;
        setTimeout(erase, 50);
      } else {
        roleIndex = (roleIndex + 1) % roles.length;
        setTimeout(type, 500);
      }
    }

    document.addEventListener("DOMContentLoaded", type);
  </script>
</body>
</html>
